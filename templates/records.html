{% extends "base.html" %}

{% block title %}Monthly Records - Expense Tracker{% endblock %}

{% block body_class %}records-page{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/records.css') }}">
{% endblock %}

{% block content %}
            <h1>📈 Monthly Records</h1>

            <div class="charts">
                <div class="chart-container">
                    <h3>Category Breakdown</h3>
                    <canvas id="categoryChart"></canvas>
                </div>
                <div class="chart-container">
                    <h3>Weekly Comparison</h3>
                    <canvas id="weeklyChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Category pie chart
        const categoryCtx = document.getElementById('categoryChart').getContext('2d');
        const categoryData = {{ category_expenses|tojson }};
        new Chart(categoryCtx, {
            type: 'pie',
            data: {
                labels: Object.keys(categoryData),
                datasets: [{
                    data: Object.values(categoryData),
                    backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9999'],
                    borderColor: '#fff',
                    borderWidth: 2,
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            padding: 15,
                            font: { size: 12 }
                        }
                    }
                }
            }
        });

        // Weekly comparison bar chart
        const weeklyCtx = document.getElementById('weeklyChart').getContext('2d');
        const weeklyData = {{ weekly_expenses|tojson }};
        new Chart(weeklyCtx, {
            type: 'bar',
            data: {
                labels: Object.keys(weeklyData).map(w => 'Week ' + w),
                datasets: [{
                    label: 'Weekly Expenses (₹)',
                    data: Object.values(weeklyData),
                    backgroundColor: 'rgba(153, 102, 255, 0.7)',
                    borderColor: 'rgba(153, 102, 255, 1)',
                    borderWidth: 2,
                    borderRadius: 6,
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        labels: {
                            font: { size: 12 }
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>

{% endblock %}
