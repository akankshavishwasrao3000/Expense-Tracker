<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Profile - Expense Tracker</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        /* Profile Card */
        .profile-card {
            max-width: 600px;
            margin: auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        /* Avatar Circle */
        .profile-avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            overflow: hidden;
            margin: auto;
            background: #f2f4f7;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Image inside circle */
        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* User info fields */
        .profile-info {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            gap: 20px;
        }

        .profile-field {
            flex: 1;
            background: #f9fafb;
            padding: 15px;
            border-radius: 10px;
        }

        .profile-field label {
            font-size: 12px;
            color: #5c6960;
        }

        .profile-field p {
            font-weight: 600;
        }

        /* Upload section */
        .profile-picture {
            margin-top: 30px;
        }
    </style>

</head>

<body class="profile-page">

    <div class="dashboard">

        <!-- Sidebar -->
        <div class="sidebar">

            <h2>💰 Expense Tracker</h2>

            <ul>
                <li><a href="{{ url_for('dashboard') }}">📊 Dashboard</a></li>
                <li><a href="{{ url_for('weekly_records') }}">📅 Weekly Records</a></li>
                <li><a href="{{ url_for('records') }}">📈 Monthly Records</a></li>
                <li><a href="{{ url_for('yearly_records') }}">📋 Yearly Records</a></li>
                <li><a href="{{ url_for('history') }}">📜 History</a></li>
                <li><a href="{{ url_for('profile') }}">👤 Profile</a></li>
                <li><a href="{{ url_for('logout') }}">🚪 Logout</a></li>
            </ul>

        </div>

        <!-- Main Content -->
        <div class="main-content">

            <h1>👤 Profile</h1>

            <div class="profile-card">

                <!-- Avatar -->
                <div class="profile-header">

                    <div class="profile-avatar">

                        {% if user.profile_pic %}
                        <img src="{{ url_for('static', filename='profile_pics/' + user.profile_pic) }}">
                        {% else %}
                        <div style="font-size:60px;">👤</div>
                        {% endif %}

                    </div>

                    <h2 style="margin-top:15px;">{{ user.username }}</h2>

                </div>

                <!-- User Info -->
                <div class="profile-info">

                    <div class="profile-field">
                        <label>USERNAME</label>
                        <p>{{ user.username }}</p>
                    </div>

                    <div class="profile-field">
                        <label>EMAIL ADDRESS</label>
                        <p>{{ user.email }}</p>
                    </div>

                </div>

                <!-- Upload Picture -->
                <div class="profile-picture">

                    <h3>Update Profile Picture</h3>

                    <form action="{{ url_for('upload_profile_pic') }}" method="POST" enctype="multipart/form-data">

                        <input type="file" name="profile_pic" accept="image/*" required>

                        <br><br>

                        <button type="submit" class="btn btn-secondary" style="background-color: rgb(60, 209, 40);">
                            Upload Picture
                        </button>

                    </form>

                </div>

            </div>

        </div>
    </div>

</body>

</html>
