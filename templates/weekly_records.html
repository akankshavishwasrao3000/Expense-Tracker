{% extends "base.html" %}

{% block title %}Weekly Records - Expense Tracker{% endblock %}

{% block body_class %}weekly-records-page{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/weekly_records.css') }}">
{% endblock %}

{% block content %}
            <h1>📅 Weekly Records</h1>

            <div class="charts">
                <div class="chart-container">
                    <h3>Daily Expenses</h3>
                    <canvas id="dailyChart"></canvas>
                </div>
                <div class="chart-container">
                    <h3>Category Breakdown</h3>
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Daily expenses bar chart
        const dailyCtx = document.getElementById('dailyChart').getContext('2d');
        const dailyData = {{ daily_expenses|tojson }};
        new Chart(dailyCtx, {
            type: 'bar',
            data: {
                labels: Object.keys(dailyData),
                datasets: [{
                    label: 'Daily Expenses (₹)',
                    data: Object.values(dailyData),
                    backgroundColor: 'rgba(75, 192, 192, 0.7)',
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 2,
                    borderRadius: 6,
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        labels: {
                            font: { size: 12 }
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        // Category pie chart
        const categoryCtx = document.getElementById('categoryChart').getContext('2d');
        const categoryData = {{ category_expenses|tojson }};
        new Chart(categoryCtx, {
            type: 'pie',
            data: {
                labels: Object.keys(categoryData),
                datasets: [{
                    data: Object.values(categoryData),
                    backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9999'],
                    borderColor: '#fff',
                    borderWidth: 2,
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            padding: 15,
                            font: { size: 12 }
                        }
                    }
                }
            }
        });
    </script>

{% endblock %}
