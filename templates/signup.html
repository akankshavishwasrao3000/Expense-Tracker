<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Expense Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            background-image: url('{{ url_for("static", filename="images/img2.jpg") }}');
        }
    </style>
</head>

<body class="auth-page">
    <div class="auth-wrapper" style="background-image: url('{{ url_for('static', filename='images/img2.jpg') }}');">
    </div>
    <div class="auth-overlay">
        <div class="auth-container">
            <h1>Sign Up</h1>
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert {{ 'success' if category == 'success' else 'error' }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}
            <form method="POST" class="form-box">
                <div class="input-field">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="icon-input user-input"
                        placeholder="Choose a username" required>
                </div>

                <div class="input-field">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" class="icon-input email-input"
                        placeholder="Enter your email" required>
                </div>

                <div class="input-field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="icon-input password-input"
                        placeholder="Create a password" required>
                </div>

                <button type="submit" class="btn" style="margin-top: 25px;">Sign Up</button>
            </form>
            <p>Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
        </div>
    </div>
</body>

</html>
